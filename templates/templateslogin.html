<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Safe Lane Login</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        :root {
            --bg-1: #0b1220;
            --bg-2: #111827;
            --card: rgba(15, 23, 42, 0.72);
            --border: rgba(255,255,255,0.10);
            --text: #ffffff;
            --muted: #9ca3af;
            --input-bg: #020617;
            --input-border: rgba(255,255,255,0.10);
            --input-focus: #22c55e;
            --button-1: #22c55e;
            --button-2: #16a34a;
            --button-shadow: rgba(34,197,94,0.30);
            --link: #60a5fa;
            --error-bg: rgba(239,68,68,0.15);
            --error-border: rgba(239,68,68,0.30);
            --error-text: #fecaca;
            --toggle-bg: rgba(255,255,255,0.04);
        }

        body.light-mode {
            --bg-1: #edf2ff;
            --bg-2: #f8fafc;
            --card: rgba(255,255,255,0.88);
            --border: rgba(15,23,42,0.08);
            --text: #0f172a;
            --muted: #64748b;
            --input-bg: #ffffff;
            --input-border: #dbe3ee;
            --input-focus: #16a34a;
            --button-1: #22c55e;
            --button-2: #16a34a;
            --button-shadow: rgba(34,197,94,0.22);
            --link: #2563eb;
            --error-bg: #fee2e2;
            --error-border: #fecaca;
            --error-text: #b91c1c;
            --toggle-bg: rgba(255,255,255,0.7);
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(79,124,255,0.12), transparent 25%),
                radial-gradient(circle at bottom right, rgba(34,197,94,0.10), transparent 20%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            transition: background 0.25s ease, color 0.25s ease;
            position: relative;
            padding: 20px;
        }

        .top-right {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .mode-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--toggle-bg);
            color: var(--text);
            cursor: pointer;
            font-size: 18px;
            transition: transform 0.15s ease, background 0.2s ease;
            backdrop-filter: blur(8px);
        }

        .mode-btn:hover {
            transform: translateY(-1px);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 36px 30px 30px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.25);
            backdrop-filter: blur(12px);
        }

        .logo {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 18px;
        }

        .title {
            font-size: 38px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 15px;
            color: var(--muted);
            margin-bottom: 28px;
        }

        .error {
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            color: var(--error-text);
            padding: 12px 14px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: var(--muted);
        }

        .field input {
            width: 100%;
            height: 48px;
            padding: 0 14px;
            border-radius: 12px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text);
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .field input::placeholder {
            color: var(--muted);
        }

        .field input:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(34,197,94,0.14);
        }

        .password-wrap {
            position: relative;
        }

        .password-wrap input {
            padding-right: 48px;
        }

        .show-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 16px;
            width: 34px;
            height: 34px;
            border-radius: 8px;
        }

        .show-btn:hover {
            background: rgba(255,255,255,0.06);
        }

        body.light-mode .show-btn:hover {
            background: rgba(15,23,42,0.05);
        }

        .row-between {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }

        .remember-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--muted);
        }

        .remember-wrap input {
            width: 16px;
            height: 16px;
            accent-color: #16a34a;
        }

        .forgot a {
            color: var(--link);
            text-decoration: none;
            font-size: 13px;
        }

        .forgot a:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--button-1), var(--button-2));
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px var(--button-shadow);
        }

        .login-btn:disabled {
            opacity: 0.88;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.35);
            border-top-color: white;
            border-radius: 50%;
            display: none;
            animation: spin 0.8s linear infinite;
        }

        .login-btn.loading .spinner {
            display: inline-block;
        }

        .login-btn.loading .btn-text {
            opacity: 0.95;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hint {
            margin-top: 16px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
        }

        @media (max-width: 520px) {
            .login-container {
                padding: 28px 20px 22px;
                border-radius: 20px;
            }

            .title {
                font-size: 30px;
            }

            .top-right {
                top: 14px;
                right: 14px;
            }
        }
    </style>
</head>
<body>

<div class="top-right">
    <button class="mode-btn" id="themeToggleBtn" type="button" title="Toggle theme">☀️</button>
</div>

<div class="login-container">
    <div class="logo">Safe Lane</div>

    <div class="title">Welcome back</div>
    <div class="subtitle">Enter your credentials to access your dashboard</div>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" id="loginForm">
        <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username">
        </div>

        <div class="field">
            <label for="password">Password</label>
            <div class="password-wrap">
                <input type="password" id="password" name="password" placeholder="Enter your password">
                <button type="button" class="show-btn" id="togglePassword" title="Show password">👁</button>
            </div>
        </div>

        <div class="row-between">
            <label class="remember-wrap">
                <input type="checkbox" id="rememberMe">
                <span>Remember me</span>
            </label>

            <div class="forgot">
                <a href="#">Forgot password?</a>
            </div>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
            <span class="spinner"></span>
            <span class="btn-text">Sign In</span>
        </button>
    </form>

    <div class="hint">
        Internal portal access only
    </div>
</div>

<script>
    const themeToggleBtn = document.getElementById("themeToggleBtn");
    const themeStorageKey = "safe_lane_login_theme";

    function applyTheme(mode) {
        if (mode === "light") {
            document.body.classList.add("light-mode");
            themeToggleBtn.textContent = "🌙";
        } else {
            document.body.classList.remove("light-mode");
            themeToggleBtn.textContent = "☀️";
        }
    }

    const savedTheme = localStorage.getItem(themeStorageKey) || "dark";
    applyTheme(savedTheme);

    themeToggleBtn.addEventListener("click", function () {
        const isLight = document.body.classList.contains("light-mode");
        const nextMode = isLight ? "dark" : "light";
        localStorage.setItem(themeStorageKey, nextMode);
        applyTheme(nextMode);
    });

    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");

    togglePassword.addEventListener("click", function () {
        const isPassword = passwordInput.type === "password";
        passwordInput.type = isPassword ? "text" : "password";
        togglePassword.textContent = isPassword ? "🙈" : "👁";
    });

    const rememberMe = document.getElementById("rememberMe");
    const usernameInput = document.getElementById("username");
    const rememberStorageKey = "safe_lane_saved_username";

    const savedUsername = localStorage.getItem(rememberStorageKey);
    if (savedUsername) {
        usernameInput.value = savedUsername;
        rememberMe.checked = true;
    }

    rememberMe.addEventListener("change", function () {
        if (!this.checked) {
            localStorage.removeItem(rememberStorageKey);
        } else {
            localStorage.setItem(rememberStorageKey, usernameInput.value);
        }
    });

    usernameInput.addEventListener("input", function () {
        if (rememberMe.checked) {
            localStorage.setItem(rememberStorageKey, this.value);
        }
    });

    const loginForm = document.getElementById("loginForm");
    const loginBtn = document.getElementById("loginBtn");

    loginForm.addEventListener("submit", function () {
        if (rememberMe.checked) {
            localStorage.setItem(rememberStorageKey, usernameInput.value);
        } else {
            localStorage.removeItem(rememberStorageKey);
        }

        loginBtn.classList.add("loading");
        loginBtn.disabled = true;
    });
</script>

</body>
</html>
